services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: locomotive
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d locomotive"]
      interval: 3s
      timeout: 5s
      retries: 10

  ingestion:
    build: ./ingestion
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      STREAM_NAME: telemetry:raw
      STREAM_MAXLEN: "100000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  processing:
    build: ./processing_service
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://user:password@timescaledb:5432/locomotive

  simulator:
    build: ./simulator
    depends_on:
      ingestion:
        condition: service_healthy
    environment:
      INGESTION_URL: ws://ingestion:8001/ws/telemetry
      HZ: "10"
      RECONNECT_DELAY_S: "2"
    restart: on-failure

  query-api:
    build:
      context: ./query-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://user:password@query-postgres/general_api_db"
    volumes:
      - ./query-api/app:/app/app
    ports:
      - "8000:8000"
    networks:
      - railway
    depends_on:
      query-postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  query-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: general_api_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - railway
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d general_api_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    depends_on:
      - query-postgres
    networks:
      - railway

volumes:
  tsdb_data:
  postgres_data:

networks:
  railway:
    name: railway-dashboard
